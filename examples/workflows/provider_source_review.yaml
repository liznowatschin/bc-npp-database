# Generic FreshForge provider source-review workflow.
#
# Copy one of the provider-specific files in examples/workflows/providers/
# before running a live provider sweep. This generic file documents the node
# shape and uses Satinflower defaults as a concrete, valid example.

workflow:
  id: provider_source_review_demo
  name: Provider source-review package
  description: Sweep a provider catalogue into a sandbox and build review apps.

nodes:
  - id: source_sweep
    provider: bc_npp_database.source_sweep
    parameters:
      provider_id: PROV-SATIN
      database_instance: vancouver
      live_fetch: true
      source_sweep: true
      catalog_url: https://satinflower.ca/collections/seed
      max_pages: 5
      raw_dir: local/provider_raw
    outputs:
      sandbox_dir: outputs/provider_sandbox_source_sweep/PROV-SATIN
    artifacts:
      sandbox_dir: outputs/provider_sandbox_source_sweep/PROV-SATIN

  - id: validate_sandbox
    provider: bc_npp_database.validate_sandbox
    needs:
      - source_sweep
    inputs:
      sandbox_dir: outputs/provider_sandbox_source_sweep/PROV-SATIN

  - id: build_review
    provider: bc_npp_database.build_review
    needs:
      - validate_sandbox
    inputs:
      sandbox_dir: outputs/provider_sandbox_source_sweep/PROV-SATIN
    outputs:
      review_dir: outputs/provider_review_source_sweep/PROV-SATIN
    artifacts:
      review_dir: outputs/provider_review_source_sweep/PROV-SATIN

  - id: build_approval_review
    provider: bc_npp_database.build_approval_review
    needs:
      - build_review
    inputs:
      sandbox_dir: outputs/provider_sandbox_source_sweep/PROV-SATIN
      poc_dir: data/poc/vancouver
    parameters:
      reviewer: expert reviewer
    outputs:
      approval_review_dir: outputs/provider_approval_review/PROV-SATIN
    artifacts:
      approval_review_dir: outputs/provider_approval_review/PROV-SATIN



