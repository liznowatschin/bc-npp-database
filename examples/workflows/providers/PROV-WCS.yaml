workflow:
  id: provider_source_review_wcs
  name: West Coast Seeds provider source-review package
  description: Sweep WCS wildflower and lawn collections into BC-NPPD review artifacts.

nodes:
  - id: source_sweep
    provider: bc_npp_database.source_sweep
    parameters:
      provider_id: PROV-WCS
      database_instance: vancouver
      live_fetch: true
      source_sweep: true
      catalog_url: https://www.westcoastseeds.com/collections/wildflower-seeds,https://www.westcoastseeds.com/collections/lawn-solutions
      max_pages: 3
      raw_dir: local/provider_raw
    outputs:
      sandbox_dir: outputs/provider_sandbox_source_sweep/PROV-WCS
    artifacts:
      sandbox_dir: outputs/provider_sandbox_source_sweep/PROV-WCS

  - id: validate_sandbox
    provider: bc_npp_database.validate_sandbox
    needs:
      - source_sweep
    inputs:
      sandbox_dir: outputs/provider_sandbox_source_sweep/PROV-WCS

  - id: build_review
    provider: bc_npp_database.build_review
    needs:
      - validate_sandbox
    inputs:
      sandbox_dir: outputs/provider_sandbox_source_sweep/PROV-WCS
    outputs:
      review_dir: outputs/provider_review_source_sweep/PROV-WCS
    artifacts:
      review_dir: outputs/provider_review_source_sweep/PROV-WCS

  - id: build_approval_review
    provider: bc_npp_database.build_approval_review
    needs:
      - build_review
    inputs:
      sandbox_dir: outputs/provider_sandbox_source_sweep/PROV-WCS
      poc_dir: data/poc/vancouver
    parameters:
      reviewer: expert reviewer
    outputs:
      approval_review_dir: outputs/provider_approval_review/PROV-WCS
    artifacts:
      approval_review_dir: outputs/provider_approval_review/PROV-WCS



