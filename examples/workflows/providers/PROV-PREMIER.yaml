workflow:
  id: provider_source_review_premier
  name: Premier Pacific provider source-review package
  description: Sweep Premier Pacific into BC-NPPD review artifacts.

nodes:
  - id: source_sweep
    provider: bc_npp_database.source_sweep
    parameters:
      provider_id: PROV-PREMIER
      database_instance: vancouver
      live_fetch: true
      source_sweep: true
      catalog_url: https://premierpacificseeds.ca
      max_pages: 5
      raw_dir: local/provider_raw
    outputs:
      sandbox_dir: outputs/provider_sandbox_source_sweep/PROV-PREMIER
    artifacts:
      sandbox_dir: outputs/provider_sandbox_source_sweep/PROV-PREMIER

  - id: validate_sandbox
    provider: bc_npp_database.validate_sandbox
    needs:
      - source_sweep
    inputs:
      sandbox_dir: outputs/provider_sandbox_source_sweep/PROV-PREMIER

  - id: build_review
    provider: bc_npp_database.build_review
    needs:
      - validate_sandbox
    inputs:
      sandbox_dir: outputs/provider_sandbox_source_sweep/PROV-PREMIER
    outputs:
      review_dir: outputs/provider_review_source_sweep/PROV-PREMIER
    artifacts:
      review_dir: outputs/provider_review_source_sweep/PROV-PREMIER

  - id: build_approval_review
    provider: bc_npp_database.build_approval_review
    needs:
      - build_review
    inputs:
      sandbox_dir: outputs/provider_sandbox_source_sweep/PROV-PREMIER
      poc_dir: data/poc/vancouver
    parameters:
      reviewer: expert reviewer
    outputs:
      approval_review_dir: outputs/provider_approval_review/PROV-PREMIER
    artifacts:
      approval_review_dir: outputs/provider_approval_review/PROV-PREMIER



